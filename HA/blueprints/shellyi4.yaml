blueprint:
  name: Shelly i4 Ultra-Fast Manual Handler
  description: Optimized for speed. Long press triggers on "hold", single/double on "release".
  domain: automation
  input:
    button_sensor:
      name: Shelly Input Sensor
      selector:
        entity:
          domain: binary_sensor
    click_counter:
      name: Counter Helper
      selector:
        entity:
          domain: counter
    single_click_action:
      name: Single Click Action
      default: []
      selector:
        action: {}
    double_click_action:
      name: Double Click Action
      default: []
      selector:
        action: {}
    long_press_action:
      name: Long Press Action
      default: []
      selector:
        action: {}

mode: restart # This is critical for the "Double Click" speed

trigger:
  - platform: state
    entity_id: !input button_sensor
    to: "on"

action:
  - service: counter.increment
    target:
      entity_id: !input click_counter

  # Check if they are HOLDING the button (Long Press)
  - wait_for_trigger:
      - platform: state
        entity_id: !input button_sensor
        to: "off"
    timeout: "00:00:00.600" # If held longer than 600ms, it's a long press
    continue_on_timeout: true

  - if:
      # If the timeout hit and button is STILL pushed down
      - condition: state
        entity_id: !input button_sensor
        state: "on"
    then:
      - sequence: !input long_press_action
      - service: counter.reset
        target:
          entity_id: !input click_counter
      - stop: "Long press executed"

  # If they released it quickly, wait a tiny window for a second click
  - delay:
      milliseconds: 250 # The "Sweet Spot" for double clicking

  - choose:
      - conditions:
          - condition: state
            entity_id: !input click_counter
            state: "2"
        sequence: !input double_click_action
      - conditions:
          - condition: state
            entity_id: !input click_counter
            state: "1"
        sequence: !input single_click_action

  - service: counter.reset
    target:
      entity_id: !input click_counter