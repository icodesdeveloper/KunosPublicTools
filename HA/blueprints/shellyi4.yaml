blueprint:
  name: Shelly i4 Manual Multi-Click (Binary Sensor)
  description: Manual handler for Shelly i4 when events aren't exposed.
  domain: automation
  input:
    button_sensor:
      name: Shelly Input Sensor
      description: The binary_sensor entity (Input 0, 1, 2, or 3).
      selector:
        entity:
          domain: binary_sensor
    click_counter:
      name: Counter Helper
      description: Create a 'Counter' helper for this specific button.
      selector:
        entity:
          domain: counter
    single_click_action:
      name: Single Click Action
      default: []
      selector:
        action: {}
    double_click_action:
      name: Double Click Action
      default: []
      selector:
        action: {}
    long_press_action:
      name: Long Press Action
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input button_sensor
    to: "on"

action:
  - service: counter.increment
    target:
      entity_id: !input click_counter

  # Wait to see if the button is held (Long Press) or released (Multi-click)
  - wait_for_trigger:
      - platform: state
        entity_id: !input button_sensor
        to: "off"
    timeout: "00:00:01"
    continue_on_timeout: true

  # If it timed out and sensor is still ON, it's a Long Press
  - if:
      - condition: state
        entity_id: !input button_sensor
        state: "on"
    then:
      - choose: []
        default: !input long_press_action
      - service: counter.reset
        target:
          entity_id: !input click_counter
      - stop: "Long press handled"

  # Otherwise, wait a moment for more clicks
  - delay:
      milliseconds: 400

  - choose:
      # Double Click
      - conditions:
          - condition: state
            entity_id: !input click_counter
            state: "2"
        sequence: !input double_click_action
      # Single Click
      - conditions:
          - condition: state
            entity_id: !input click_counter
            state: "1"
        sequence: !input single_click_action

  # Cleanup
  - service: counter.reset
    target:
      entity_id: !input click_counter