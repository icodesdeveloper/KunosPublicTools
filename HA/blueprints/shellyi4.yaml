#R1
blueprint:
  name: Shelly i4 Ultra-Fast (Manual)
  description: Separate Single/Double/Long actions with minimum latency.
  domain: automation
  input:
    button_sensor:
      name: Shelly Input Sensor
      selector:
        entity:
          domain: binary_sensor
    single_click_action:
      name: Single Click Action
      default: []
      selector:
        action: {}
    double_click_action:
      name: Double Click Action
      default: []
      selector:
        action: {}
    long_press_action:
      name: Long Press Action
      default: []
      selector:
        action: {}

mode: restart # Essential to catch the second click immediately

trigger:
  - platform: state
    entity_id: !input button_sensor
    to: "on"

action:
  # 1. Determine if this is a Long Press or a release
  - wait_for_trigger:
      - platform: state
        entity_id: !input button_sensor
        to: "off"
    timeout: "00:00:00.500" # If held > 500ms, it's a long press
    continue_on_timeout: true

  - if:
      - condition: state
        entity_id: !input button_sensor
        state: "on"
    then:
      - sequence: !input long_press_action
      - stop: "Long press done"

  # 2. It was released quickly. Now wait a TINY window for the second press.
  - wait_for_trigger:
      - platform: state
        entity_id: !input button_sensor
        to: "on"
    timeout: "00:00:00.200" # 200ms window for the second click
    continue_on_timeout: true

  - if:
      # If the second click happened (sensor is back to 'on')
      - condition: state
        entity_id: !input button_sensor
        state: "on"
    then:
      - sequence: !input double_click_action
    else:
      # If the window expired without a second click
      - sequence: !input single_click_action